# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
    SYMFONY: symfony
    CONSOLE: symfony console

silent: true

tasks:
    default:
        desc: List available tasks
        cmds:
            - task --list

    # Server
    up:
        desc: Bring the server up
        cmds:
            - "{{.SYMFONY}} serve -d"
            - "docker compose up -d"

    down:
        desc: Bring the server down
        cmds:
            - "{{.SYMFONY}} server:stop"
            - "docker compose down"

    # DB
    migrations:
        desc: Create migrations
        cmds:
            - "{{.CONSOLE}} make:migration"

    migrate:
        desc: Execute the pending migrations
        cmds:
            - "{{.CONSOLE}} d:m:m --no-interaction"

    setup-db:
        desc: setup the db with fixtures
        internal: true
        vars:
            ENV: '{{ default "dev" .ENV}}'
        cmds:
            - "{{.CONSOLE}} d:d:d --force --if-exists --env={{.ENV}}"
            - "{{.CONSOLE}} d:d:c --env={{.ENV}}"
            - "{{.CONSOLE}} doctrine:migrations:migrate --no-interaction --env={{.ENV}}"
            - "{{.CONSOLE}} doctrine:fixtures:load --no-interaction --env={{.ENV}}"

    # Test
    test-init:
        desc: Init test environment
        cmds:
            - rm -f var/data_test.db
            - "{{.CONSOLE}} d:d:d --force --env=test"
            - "{{.CONSOLE}} d:s:u --force --env=test"
            - "{{.CONSOLE}} doctrine:fixtures:load --no-interaction --env=test"

    tests:
        desc: Run tests
        cmds:
            - bin/phpunit --testdox

    # Setup
    install:
        desc: Full project setup (install, migrate, load fixtures)
        cmds:
            - composer install
            - bin/console importmap:install
            - task: reset
              vars: {ENV: 'dev'}

    reset:
        desc: Drop and recreate the database, then reload fixtures
        cmds:
            - task: setup-db
              vars: {ENV: 'dev'}
            - task: copy-testfiles
            - task: test-init

    copy-testfiles:
        desc: copy all the sheets test files from the tests to the public
        internal: true
        cmds:
            - rm -rf public/uploads/sheets/*
            - cp tests/public/uploads/sheets/* public/uploads/sheets/

    # Branch switching
    checkout:
        desc: Switch to a demo branch and reload fixtures
        requires:
            vars:
                - name: BRANCH
                  enum:
                      - epic/03-easyadmin
                      - epic/04-authentication
                      - epic/07-filters
                      - epic/08-actions
                      - epic/10-dnd-reorder
                      - epic/11-advanced
                      - epic/13-presentation
                      - main
        cmds:
            - git stash
            - git checkout "{{.BRANCH}}"
            - task: install


    # presentation
    present:
        desc: Start the presentation deck from docs/presentation
        dir: docs/presentation
        cmds:
            - pnpm dev
